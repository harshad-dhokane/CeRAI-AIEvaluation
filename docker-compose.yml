services:
  db:
    image: mariadb:11
    container_name: aiet-db
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: root_password
      MARIADB_DATABASE: aievaluationtool
      MARIADB_USER: aiet_user
      MARIADB_PASSWORD: aiet_password
    expose:
      - 3306
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost", "-uroot", "-proot_password"]
      interval: 10s
      timeout: 5s
      retries: 12

  selenium-browser:
    image: selenium/standalone-chrome:latest
    container_name: demo-browser
    shm_size: 2gb
    ports:
      - "7900:7900" # NoVNC live browser view
      # - "4444:4444" # Selenium WebDriver endpoint
    environment:
      - SE_VNC_NO_PASSWORD=1
    volumes:
      - ./chrome-data:/home/seluser/chrome-data
    restart: unless-stopped

  interface-manager:
    build:
      context: .
      dockerfile: Dockerfile.interface-manager
    container_name: aiet-interface-manager
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      selenium-browser:
        condition: service_started
    ports:
      - "8000:8000"
    volumes:
      - ./:/app
      - ./logs:/app/logs
      - ./data:/app/data

  app-backend:
    build:
      context: .
      dockerfile: Dockerfile.app-backend
    container_name: aiet-backend
    depends_on:
      db:
        condition: service_healthy
      interface-manager:
        condition: service_started
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    working_dir: /app
    expose:
      - 7000
    ports:
      - "7000:7000"
    env_file:
      - .env
    volumes:
      - ./:/app

  app-front-end:
    build:
      context: .
      dockerfile: Dockerfile.app-front-end
    container_name: aiet-front-end
    restart: unless-stopped
    depends_on:
      - app-backend
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_BASE_URL=http://localhost:7000
      - CHOKIDAR_USEPOLLING=true
    
  # app-cli:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile.app-cli
  #   container_name: aiet-cli
  #   depends_on:
  #     db:
  #       condition: service_healthy
  #     interface-manager:
  #       condition: service_started
  #   extra_hosts:
  #     - "host.docker.internal:host-gateway"
  #   working_dir: /app
  #   volumes:
  #     - ./:/app
  #     - ./logs:/app/logs
  #     - ./data:/app/data
  #     - ./reports:/app/src/app/response_analyzer/reports
  #   env_file:
  #     - .env
  #   tty: true
  #   stdin_open: true
  tdms-backend:
    build:
      context: .
      dockerfile: Dockerfile.tdms-backend
    container_name: tdms-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8100:8100"
    volumes:
      - ./:/app
      - ./logs:/app/logs
      - ./data:/app/data
    env_file:
      - .env

  tdms-frontend:
    build:
      context: .
      dockerfile: Dockerfile.tdms-frontend
    container_name: tdms-frontend
    restart: unless-stopped
    depends_on:
      - tdms-backend
    ports:
      - "8080:80"

volumes:
  mariadb_data:
